<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>撞球遊戲</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0b0604;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Arial', sans-serif;
  user-select: none;
  overflow: hidden;
}
canvas { display: block; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ─── Canvas ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const CW = 960, CH = 600;
canvas.width = CW; canvas.height = CH;

// ─── Table geometry ──────────────────────────────────────────────────────────
const FX=20, FY=14, FW=920, FH=540;
const RAIL=42;
const PX=FX+RAIL, PY=FY+RAIL;
const PW=FW-RAIL*2, PH=FH-RAIL*2;   // 836 × 456

// ─── Physics constants ───────────────────────────────────────────────────────
const BR=12, PR=20;
const FRICTION=0.988, MIN_V=0.07;
const REST_BALL=0.93, REST_WALL=0.80;
const MAX_POWER=24;

// ─── Pockets ─────────────────────────────────────────────────────────────────
const POCKETS=[
  {x:PX,       y:PY},      {x:PX+PW/2, y:PY-9},
  {x:PX+PW,    y:PY},      {x:PX,      y:PY+PH},
  {x:PX+PW/2,  y:PY+PH+9},{x:PX+PW,   y:PY+PH},
];

// ─── Ball colours ────────────────────────────────────────────────────────────
const COLORS=[
  null,'#F5D800','#1560CC','#CC1515','#7B1FA2',
  '#F57C00','#2E7D32','#8B1A1A','#111111',
  '#F5D800','#1560CC','#CC1515','#7B1FA2','#F57C00','#2E7D32','#8B1A1A',
];

// ─── Helpers ─────────────────────────────────────────────────────────────────
function hexRgb(h){const n=parseInt(h.replace('#',''),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function tint(h,a){const[r,g,b]=hexRgb(h);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}
function shade(h,a){const[r,g,b]=hexRgb(h);return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

// ════════════════════════════════════════════════════════════════════════════
// ─── AUDIO SYSTEM ────────────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
let AC=null, masterGain=null, musicGain=null, sfxGain=null;
let muted=false, musicStarted=false, musicTimer=null;
let nextBeat=0, beatCount=0;

// Last-played timestamps for throttle
const sfxLast={};

function initAudio(){
  if(AC) return;
  AC=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=AC.createGain(); masterGain.gain.value=0.8; masterGain.connect(AC.destination);
  musicGain=AC.createGain();  musicGain.gain.value=0.55; musicGain.connect(masterGain);
  sfxGain=AC.createGain();    sfxGain.gain.value=1.0;    sfxGain.connect(masterGain);
}

function toggleMute(){
  muted=!muted;
  if(masterGain) masterGain.gain.setTargetAtTime(muted?0:0.8, AC.currentTime, 0.08);
}

function canPlay(key, ms=40){
  const now=performance.now();
  if(!sfxLast[key]||now-sfxLast[key]>ms){sfxLast[key]=now;return true;}
  return false;
}

// ─── Background Music (jazz lounge) ──────────────────────────────────────────
const BPM=108, BEAT=60/BPM;

// Chord progression: Cmaj7 → Am7 → Dm7 → G7
const PROG=[
  {bass:65.41, walk:98.00, pad:[261.63,329.63,392.00,493.88]},  // Cmaj7
  {bass:55.00, walk:82.41, pad:[220.00,261.63,329.63,392.00]},  // Am7
  {bass:73.42, walk:110.0, pad:[293.66,349.23,440.00,523.25]},  // Dm7
  {bass:49.00, walk:73.42, pad:[196.00,246.94,293.66,349.23]},  // G7
];

function mPad(freqs, t0, dur){
  freqs.forEach(f=>{
    const o=AC.createOscillator(), e=AC.createGain(), fi=AC.createBiquadFilter();
    fi.type='lowpass'; fi.frequency.value=900;
    o.type='sine'; o.frequency.value=f;
    o.connect(fi); fi.connect(e); e.connect(musicGain);
    e.gain.setValueAtTime(0,t0);
    e.gain.linearRampToValueAtTime(0.065,t0+0.5);
    e.gain.setValueAtTime(0.055,t0+dur-0.4);
    e.gain.linearRampToValueAtTime(0,t0+dur);
    o.start(t0); o.stop(t0+dur+0.1);
  });
}

function mBass(freq, t0, dur){
  const o=AC.createOscillator(), e=AC.createGain(), fi=AC.createBiquadFilter();
  fi.type='lowpass'; fi.frequency.value=380;
  o.type='triangle'; o.frequency.value=freq;
  o.connect(fi); fi.connect(e); e.connect(musicGain);
  e.gain.setValueAtTime(0,t0);
  e.gain.linearRampToValueAtTime(0.25,t0+0.03);
  e.gain.setValueAtTime(0.20,t0+dur*0.65);
  e.gain.linearRampToValueAtTime(0,t0+dur);
  o.start(t0); o.stop(t0+dur+0.05);
}

function mKick(t0, vol=0.38){
  const o=AC.createOscillator(), e=AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(140,t0);
  o.frequency.exponentialRampToValueAtTime(38,t0+0.18);
  o.connect(e); e.connect(musicGain);
  e.gain.setValueAtTime(vol,t0);
  e.gain.exponentialRampToValueAtTime(0.001,t0+0.22);
  o.start(t0); o.stop(t0+0.25);
}

function mHat(t0, vol=0.06, dec=0.04){
  const sz=Math.ceil(AC.sampleRate*(dec+0.01));
  const buf=AC.createBuffer(1,sz,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<sz;i++) d[i]=Math.random()*2-1;
  const s=AC.createBufferSource(), fi=AC.createBiquadFilter(), e=AC.createGain();
  fi.type='highpass'; fi.frequency.value=8500;
  s.buffer=buf;
  s.connect(fi); fi.connect(e); e.connect(musicGain);
  e.gain.setValueAtTime(vol,t0);
  e.gain.exponentialRampToValueAtTime(0.001,t0+dec);
  s.start(t0); s.stop(t0+dec+0.01);
}

function scheduleBeat(){
  if(!AC) return;
  while(nextBeat < AC.currentTime+0.3){
    const bar=Math.floor(beatCount/4)%PROG.length;
    const beat=beatCount%4;
    const p=PROG[bar];
    const np=PROG[(bar+1)%PROG.length];

    if(beat===0){ mPad(p.pad, nextBeat, BEAT*4*0.93); }

    if(beat===0) mBass(p.bass, nextBeat, BEAT*1.75);
    if(beat===2) mBass(p.walk, nextBeat, BEAT*1.75);
    if(beat===3) mBass(np.bass*2, nextBeat+BEAT*0.5, BEAT*0.45);

    if(beat===0) mKick(nextBeat);
    if(beat===2) mKick(nextBeat, 0.18);

    mHat(nextBeat, 0.09, 0.055);
    mHat(nextBeat+BEAT*0.5, 0.055, 0.03);
    mHat(nextBeat+BEAT*0.25, 0.03, 0.02);
    mHat(nextBeat+BEAT*0.75, 0.03, 0.02);

    nextBeat+=BEAT; beatCount++;
  }
  musicTimer=setTimeout(scheduleBeat, 100);
}

function startMusic(){
  if(musicStarted||!AC) return;
  musicStarted=true;
  nextBeat=AC.currentTime+0.12;
  scheduleBeat();
}

// ─── SFX ─────────────────────────────────────────────────────────────────────
function sfxCue(pwr){
  if(!AC||muted) return;
  const t=AC.currentTime, v=0.25+pwr*0.65;
  const o=AC.createOscillator(), e=AC.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(900,t);
  o.frequency.exponentialRampToValueAtTime(180,t+0.09);
  o.connect(e); e.connect(sfxGain);
  e.gain.setValueAtTime(v*0.55,t);
  e.gain.exponentialRampToValueAtTime(0.001,t+0.13);
  o.start(t); o.stop(t+0.14);
  const o2=AC.createOscillator(), e2=AC.createGain();
  o2.frequency.setValueAtTime(200,t);
  o2.frequency.exponentialRampToValueAtTime(55,t+0.11);
  o2.connect(e2); e2.connect(sfxGain);
  e2.gain.setValueAtTime(v*0.45,t);
  e2.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  o2.start(t); o2.stop(t+0.15);
}

function sfxBallHit(intensity){
  if(!AC||muted||!canPlay('hit',40)) return;
  const t=AC.currentTime, v=Math.min(1,intensity);
  const sz=Math.ceil(AC.sampleRate*0.06);
  const buf=AC.createBuffer(1,sz,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<sz;i++) d[i]=Math.random()*2-1;
  const ns=AC.createBufferSource(), fi=AC.createBiquadFilter(), e=AC.createGain();
  fi.type='bandpass'; fi.frequency.value=2200; fi.Q.value=2.5;
  ns.buffer=buf; ns.connect(fi); fi.connect(e); e.connect(sfxGain);
  e.gain.setValueAtTime(v*0.75,t);
  e.gain.exponentialRampToValueAtTime(0.001,t+0.065);
  ns.start(t); ns.stop(t+0.07);
  const o=AC.createOscillator(), oe=AC.createGain();
  o.frequency.value=1100+v*500;
  o.connect(oe); oe.connect(sfxGain);
  oe.gain.setValueAtTime(v*0.3,t);
  oe.gain.exponentialRampToValueAtTime(0.001,t+0.04);
  o.start(t); o.stop(t+0.045);
}

function sfxWall(intensity){
  if(!AC||muted||!canPlay('wall',80)) return;
  const t=AC.currentTime, v=Math.min(0.5,intensity*0.45);
  const o=AC.createOscillator(), e=AC.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(260,t);
  o.frequency.exponentialRampToValueAtTime(85,t+0.1);
  o.connect(e); e.connect(sfxGain);
  e.gain.setValueAtTime(v,t);
  e.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.start(t); o.stop(t+0.13);
}

function sfxPocket(){
  if(!AC||muted||!canPlay('pocket',150)) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(), e=AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(300,t);
  o.frequency.exponentialRampToValueAtTime(72,t+0.3);
  o.connect(e); e.connect(sfxGain);
  e.gain.setValueAtTime(0.5,t);
  e.gain.exponentialRampToValueAtTime(0.001,t+0.34);
  o.start(t); o.stop(t+0.36);
  const o2=AC.createOscillator(), e2=AC.createGain();
  o2.type='sine';
  o2.frequency.setValueAtTime(105,t);
  o2.frequency.exponentialRampToValueAtTime(32,t+0.2);
  o2.connect(e2); e2.connect(sfxGain);
  e2.gain.setValueAtTime(0.38,t);
  e2.gain.exponentialRampToValueAtTime(0.001,t+0.24);
  o2.start(t); o2.stop(t+0.26);
}

function sfxGameOver(){
  if(!AC||muted) return;
  const t=AC.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
    const o=AC.createOscillator(), e=AC.createGain();
    o.type='triangle'; o.frequency.value=f;
    o.connect(e); e.connect(sfxGain);
    const s=t+i*0.18;
    e.gain.setValueAtTime(0.35,s);
    e.gain.exponentialRampToValueAtTime(0.001,s+0.45);
    o.start(s); o.stop(s+0.5);
  });
}

// ─── Ball class ───────────────────────────────────────────────────────────────
class Ball {
  constructor(x,y,num){
    this.x=x; this.y=y; this.vx=0; this.vy=0;
    this.num=num; this.color=COLORS[num]||'#fff';
    this.isCue=(num===0); this.isStripe=(num>=9);
    this.inPocket=false; this.sinkT=1.0;
  }
  get moving(){return this.vx!==0||this.vy!==0;}
  update(){
    if(this.inPocket){this.sinkT=Math.max(0,this.sinkT-0.08);return;}
    this.x+=this.vx; this.y+=this.vy;
    this.vx*=FRICTION; this.vy*=FRICTION;
    if(Math.abs(this.vx)<MIN_V) this.vx=0;
    if(Math.abs(this.vy)<MIN_V) this.vy=0;

    for(const p of POCKETS){
      if(Math.hypot(this.x-p.x,this.y-p.y)<PR){
        this.inPocket=true; this.vx=this.vy=0;
        sfxPocket(); return;
      }
    }

    const L=PX+BR, R=PX+PW-BR, T=PY+BR, B=PY+PH-BR;
    const spd=Math.hypot(this.vx,this.vy);
    if(this.x<L){this.x=L; this.vx=Math.abs(this.vx)*REST_WALL; sfxWall(spd/MAX_POWER);}
    if(this.x>R){this.x=R; this.vx=-Math.abs(this.vx)*REST_WALL; sfxWall(spd/MAX_POWER);}
    if(this.y<T){this.y=T; this.vy=Math.abs(this.vy)*REST_WALL; sfxWall(spd/MAX_POWER);}
    if(this.y>B){this.y=B; this.vy=-Math.abs(this.vy)*REST_WALL; sfxWall(spd/MAX_POWER);}
  }
  draw(){
    if(this.inPocket&&this.sinkT<=0) return;
    ctx.save(); ctx.translate(this.x,this.y);
    if(this.inPocket) ctx.scale(this.sinkT,this.sinkT);
    this._render(); ctx.restore();
  }
  _render(){
    const r=BR;
    if(this.isCue){
      const g=ctx.createRadialGradient(-r*.35,-r*.35,r*.04,0,0,r);
      g.addColorStop(0,'#ffffff'); g.addColorStop(0.65,'#dedede'); g.addColorStop(1,'#aaaaaa');
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    } else if(this.isStripe){
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle='#f5f5f5'; ctx.fill();
      ctx.save(); ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle=this.color; ctx.fillRect(-r,-r*0.46,r*2,r*0.92); ctx.restore();
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
      ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.8; ctx.stroke();
    } else {
      const g=ctx.createRadialGradient(-r*.32,-r*.36,r*.04,0,0,r*1.05);
      g.addColorStop(0,tint(this.color,65)); g.addColorStop(0.45,this.color); g.addColorStop(1,shade(this.color,55));
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    }
    if(!this.isCue){
      ctx.beginPath(); ctx.arc(0,0,r*.41,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.88)'; ctx.fill();
      ctx.fillStyle='#111'; ctx.font=`bold ${r*.56}px Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.num,0,0.5);
    }
    ctx.beginPath();
    ctx.ellipse(-r*.28,-r*.32,r*.28,r*.18,-Math.PI/4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.42)'; ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.7; ctx.stroke();
  }
}

// ─── Collision ────────────────────────────────────────────────────────────────
function resolveCollision(a,b){
  if(a.inPocket||b.inPocket) return;
  const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy);
  if(d===0||d>=BR*2) return;
  const nx=dx/d, ny=dy/d;
  const vrel=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
  if(vrel<=0) return;
  if(vrel>0.4) sfxBallHit(vrel/MAX_POWER);
  const imp=vrel*REST_BALL;
  a.vx-=imp*nx; a.vy-=imp*ny;
  b.vx+=imp*nx; b.vy+=imp*ny;
  const ov=(BR*2-d)/2;
  a.x-=nx*ov; a.y-=ny*ov;
  b.x+=nx*ov; b.y+=ny*ov;
}

// ─── Raycast ─────────────────────────────────────────────────────────────────
function raycast(ox,oy,angle){
  const dx=Math.cos(angle), dy=Math.sin(angle);
  let minT=99999, hitBall=null;
  for(const b of balls){
    if(b.isCue||b.inPocket) continue;
    const ex=b.x-ox, ey=b.y-oy;
    const proj=ex*dx+ey*dy;
    if(proj<BR) continue;
    const perp=ex*dy-ey*dx, r2=BR*2;
    if(Math.abs(perp)>=r2) continue;
    const t=proj-Math.sqrt(r2*r2-perp*perp);
    if(t>0&&t<minT){minT=t; hitBall=b;}
  }
  const L=PX+BR, R=PX+PW-BR, T=PY+BR, B=PY+PH-BR;
  const ts=[];
  if(dx!==0){ts.push((L-ox)/dx,(R-ox)/dx);}
  if(dy!==0){ts.push((T-oy)/dy,(B-oy)/dy);}
  const wallT=Math.min(...ts.filter(t=>t>0.1));
  const useT=hitBall?minT:wallT;
  return{ex:ox+dx*useT, ey:oy+dy*useT, hitBall};
}

// ─── Ball rack ────────────────────────────────────────────────────────────────
function makeBalls(){
  const list=[];
  list.push(new Ball(PX+PW*0.25, PY+PH/2, 0));
  const rx=PX+PW*0.65, ry=PY+PH/2, sp=BR*2.06;
  const rows=[[1],[9,2],[3,8,10],[4,14,11,7],[12,6,15,13,5]];
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      list.push(new Ball(
        rx+r*sp*Math.cos(Math.PI/6),
        ry+(c-(row.length-1)/2)*sp,
        row[c]
      ));
    }
  }
  return list;
}

// ─── Game state ───────────────────────────────────────────────────────────────
let balls, state, aimAngle, power, charging;
let mx=CW/2, my=CH/2;
let aiTimer, aiShot;
let playerScore, aiScore, prevPocketed, tick;
let gameOverSfxPlayed=false;

function init(){
  balls=makeBalls(); state='player';
  aimAngle=0; power=0; charging=false;
  aiTimer=0; aiShot=null;
  playerScore=0; aiScore=0; prevPocketed=0; tick=0;
  gameOverSfxPlayed=false;
}
init();

function getCue(){return balls.find(b=>b.isCue&&!b.inPocket);}
function allStop(){return balls.every(b=>b.inPocket||(b.vx===0&&b.vy===0));}
function activeBalls(){return balls.filter(b=>!b.isCue&&!b.inPocket);}

// ─── Draw: table ─────────────────────────────────────────────────────────────
function drawTable(){
  ctx.fillStyle='#0b0604'; ctx.fillRect(0,0,CW,CH);
  rr(FX,FY,FW,FH,18);
  const wg=ctx.createLinearGradient(FX,FY,FX,FY+FH);
  wg.addColorStop(0,'#5e3318'); wg.addColorStop(0.18,'#3f2009');
  wg.addColorStop(0.82,'#2b1506'); wg.addColorStop(1,'#180b00');
  ctx.fillStyle=wg; ctx.fill();
  ctx.strokeStyle='#0a0503'; ctx.lineWidth=3; ctx.stroke();
  rr(FX+2,FY+2,FW-4,FH-4,16);
  ctx.strokeStyle='rgba(255,200,100,0.06)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(PX-4,PY-4,PW+8,PH+8);
  const fg=ctx.createRadialGradient(PX+PW/2,PY+PH/2,55,PX+PW/2,PY+PH/2,PW*.72);
  fg.addColorStop(0,'#2ea648'); fg.addColorStop(0.45,'#268a3c'); fg.addColorStop(1,'#1c6228');
  ctx.fillStyle=fg; ctx.fillRect(PX,PY,PW,PH);
  ctx.save(); ctx.globalAlpha=0.03; ctx.strokeStyle='#000'; ctx.lineWidth=1;
  for(let x=PX;x<PX+PW;x+=7){ctx.beginPath();ctx.moveTo(x,PY);ctx.lineTo(x,PY+PH);ctx.stroke();}
  ctx.restore();
  const bx=PX+PW*0.25;
  ctx.save(); ctx.setLineDash([5,7]);
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(bx,PY); ctx.lineTo(bx,PY+PH); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx,PY+PH/2,PH*0.18,-Math.PI/2,Math.PI/2); ctx.stroke();
  ctx.restore();
  ctx.beginPath(); ctx.arc(PX+PW/2,PY+PH/2,4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.13)'; ctx.fill();
  for(const p of POCKETS){
    ctx.beginPath(); ctx.arc(p.x,p.y,PR+5,0,Math.PI*2);
    ctx.fillStyle='#1a0a00'; ctx.fill();
    const hg=ctx.createRadialGradient(p.x,p.y,1,p.x,p.y,PR+2);
    hg.addColorStop(0,'#000'); hg.addColorStop(0.6,'#0a0a0a'); hg.addColorStop(1,'#222');
    ctx.beginPath(); ctx.arc(p.x,p.y,PR,0,Math.PI*2);
    ctx.fillStyle=hg; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,PR,0,Math.PI*2);
    ctx.strokeStyle='rgba(80,40,0,0.6)'; ctx.lineWidth=2; ctx.stroke();
  }
  ctx.fillStyle='rgba(200,160,80,0.42)';
  [[1,2,3],[1,2,3]].forEach((_,side)=>{
    for(let i=1;i<4;i++){
      const x=PX+PW*i/4;
      const y=side===0 ? PY-RAIL/2 : PY+PH+RAIL/2;
      ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fill();
    }
  });
  [1].forEach(i=>{
    const y=PY+PH*i/2;
    ctx.beginPath(); ctx.arc(PX-RAIL/2,y,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(PX+PW+RAIL/2,y,3.5,0,Math.PI*2); ctx.fill();
  });
}

// ─── Draw: aim line ──────────────────────────────────────────────────────────
function drawAimLine(cb,angle){
  const{ex,ey,hitBall}=raycast(cb.x,cb.y,angle);
  ctx.save();
  ctx.setLineDash([9,6]); ctx.strokeStyle='rgba(255,255,210,0.65)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cb.x,cb.y); ctx.lineTo(ex,ey); ctx.stroke();
  if(hitBall){
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(ex,ey,BR,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.32)'; ctx.lineWidth=1.5; ctx.stroke();
    const bA=Math.atan2(hitBall.y-ey,hitBall.x-ex);
    ctx.setLineDash([5,6]);
    ctx.beginPath(); ctx.moveTo(ex,ey);
    ctx.lineTo(ex+Math.cos(bA)*90,ey+Math.sin(bA)*90);
    ctx.strokeStyle='rgba(255,200,80,0.4)'; ctx.lineWidth=1; ctx.stroke();
    const cA=bA-Math.PI/2;
    ctx.beginPath(); ctx.moveTo(ex,ey);
    ctx.lineTo(ex+Math.cos(cA)*65,ey+Math.sin(cA)*65);
    ctx.strokeStyle='rgba(180,255,180,0.3)'; ctx.lineWidth=1; ctx.stroke();
  }
  ctx.setLineDash([]); ctx.restore();
}

// ─── Draw: cue ───────────────────────────────────────────────────────────────
function drawCue(cb,angle,pull){
  if(!cb) return;
  const len=250, off=BR+10+pull*30;
  const tx=cb.x-Math.cos(angle)*off, ty=cb.y-Math.sin(angle)*off;
  const bx=tx-Math.cos(angle)*len,   by=ty-Math.sin(angle)*len;
  ctx.save(); ctx.lineCap='round';
  ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=5; ctx.shadowOffsetY=2;
  const g=ctx.createLinearGradient(tx,ty,bx,by);
  g.addColorStop(0,'#d4c06a'); g.addColorStop(0.06,'#b89040');
  g.addColorStop(0.5,'#8b6030'); g.addColorStop(1,'#3e1e00');
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(bx,by);
  ctx.strokeStyle=g; ctx.lineWidth=5; ctx.stroke();
  ctx.shadowColor='transparent';
  ctx.beginPath(); ctx.moveTo(tx,ty);
  ctx.lineTo(tx-Math.cos(angle)*10,ty-Math.sin(angle)*10);
  ctx.strokeStyle='#5599ee'; ctx.lineWidth=3; ctx.stroke();
  ctx.restore();
}

// ─── Draw: power bar ─────────────────────────────────────────────────────────
function drawPower(pwr){
  const bx=32, by=CH-168, bw=18, bh=108;
  ctx.fillStyle='rgba(0,0,0,0.6)'; rr(bx-6,by-7,bw+12,bh+44,6); ctx.fill();
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(bx,by,bw,bh);
  const ph=bh*pwr;
  const pg=ctx.createLinearGradient(0,by+bh-ph,0,by+bh);
  pg.addColorStop(0,'#ff2200'); pg.addColorStop(0.4,'#ffaa00'); pg.addColorStop(1,'#22ff55');
  ctx.fillStyle=pg; ctx.fillRect(bx,by+bh-ph,bw,ph);
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
  for(let i=1;i<4;i++){const ty=by+bh*(1-i/4);ctx.beginPath();ctx.moveTo(bx,ty);ctx.lineTo(bx+bw,ty);ctx.stroke();}
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#ccc'; ctx.font='11px Arial'; ctx.textAlign='center';
  ctx.fillText('力道',bx+bw/2,by+bh+15);
  ctx.fillStyle='#fff'; ctx.font='bold 10px Arial';
  ctx.fillText(Math.round(pwr*100)+'%',bx+bw/2,by+bh+28);
}

// ─── Draw: mute button ───────────────────────────────────────────────────────
const MUTE_BTN={x:CW-108, y:8, w:100, h:28};
function drawMuteBtn(){
  ctx.fillStyle=muted?'rgba(200,60,60,0.82)':'rgba(40,160,80,0.82)';
  rr(MUTE_BTN.x,MUTE_BTN.y,MUTE_BTN.w,MUTE_BTN.h,6); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='13px Arial'; ctx.textAlign='center';
  ctx.fillText(muted?'🔇 已靜音':'🔊 音效開', MUTE_BTN.x+MUTE_BTN.w/2, MUTE_BTN.y+19);
}

function inMuteBtn(x,y){
  return x>=MUTE_BTN.x&&x<=MUTE_BTN.x+MUTE_BTN.w&&y>=MUTE_BTN.y&&y<=MUTE_BTN.y+MUTE_BTN.h;
}

// ─── Draw: HUD ───────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,CH-44,CW,44);
  ctx.strokeStyle='rgba(80,50,20,0.6)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,CH-44); ctx.lineTo(CW,CH-44); ctx.stroke();

  let msg='', col='#fff';
  const dots='.'.repeat((Math.floor(tick/14)%3)+1);
  if     (state==='player')  {msg='你的回合 — 滑鼠瞄準，按住左鍵蓄力，放開擊球';col='#aaddff';}
  else if(state==='moving')  {msg='球運動中…';col='#ccc';}
  else if(state==='ai_think'){msg=`AI 思考中${dots}`;col='#FFD700';}
  else if(state==='ai_aim')  {msg='AI 瞄準中…';col='#FFD700';}
  else if(state==='ai_move') {msg='AI 擊球';col='#ffbb44';}
  else if(state==='over')    {msg='遊戲結束！點擊任意處重新開始';col='#FFD700';}

  ctx.fillStyle=col; ctx.font='15px Arial'; ctx.textAlign='center';
  ctx.fillText(msg,CW/2,CH-16);
  ctx.fillStyle='rgba(200,200,200,0.55)'; ctx.font='12px Arial';
  ctx.fillText(`剩餘 ${activeBalls().length} 球`,CW/2,CH-30);

  ctx.textAlign='left';
  ctx.fillStyle='#7ec8ff'; ctx.font='bold 14px Arial'; ctx.fillText('玩家',15,CH-27);
  ctx.fillStyle='#aaddff'; ctx.font='bold 21px Arial'; ctx.fillText(playerScore,15,CH-9);

  ctx.textAlign='right';
  ctx.fillStyle='#ffc870'; ctx.font='bold 14px Arial'; ctx.fillText('AI',CW-15,CH-27);
  ctx.fillStyle='#ffddaa'; ctx.font='bold 21px Arial'; ctx.fillText(aiScore,CW-15,CH-9);

  if(state==='player'||state==='moving'){
    ctx.fillStyle='rgba(100,180,255,0.13)'; ctx.fillRect(0,CH-44,75,44);
    ctx.strokeStyle='rgba(100,180,255,0.38)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(75,CH-44); ctx.lineTo(0,CH-44); ctx.lineTo(0,CH); ctx.stroke();
  }
  if(state==='ai_think'||state==='ai_aim'||state==='ai_move'){
    ctx.fillStyle='rgba(255,200,80,0.11)'; ctx.fillRect(CW-75,CH-44,75,44);
    ctx.strokeStyle='rgba(255,200,80,0.38)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(CW-75,CH-44); ctx.lineTo(CW,CH-44); ctx.lineTo(CW,CH); ctx.stroke();
  }
  drawMuteBtn();
}

// ─── AI logic ─────────────────────────────────────────────────────────────────
function computeAIShot(){
  const cb=getCue(); if(!cb) return null;
  const targets=activeBalls(); if(!targets.length) return null;
  let best=null, bestScore=-Infinity;
  for(const t of targets){
    for(const p of POCKETS){
      const tpDx=p.x-t.x, tpDy=p.y-t.y, tpD=Math.hypot(tpDx,tpDy);
      if(tpD<1) continue;
      const nx=-tpDx/tpD, ny=-tpDy/tpD;
      const ix=t.x+nx*BR*2, iy=t.y+ny*BR*2;
      const dx=ix-cb.x, dy=iy-cb.y, dist=Math.hypot(dx,dy);
      if(dist<1) continue;
      const angle=Math.atan2(dy,dx);
      let blocked=false;
      for(const obs of balls){
        if(obs===t||obs.isCue||obs.inPocket) continue;
        const ex=obs.x-cb.x, ey=obs.y-cb.y;
        const adx=Math.cos(angle), ady=Math.sin(angle);
        const proj=ex*adx+ey*ady;
        if(proj<0||proj>dist) continue;
        if(Math.abs(ex*ady-ey*adx)<BR*2){blocked=true;break;}
      }
      if(blocked) continue;
      const score=400/tpD-dist*0.3+Math.random()*20;
      if(score>bestScore){bestScore=score; best={angle,power:0.35+Math.random()*0.38};}
    }
  }
  if(!best){
    const t=targets.reduce((a,b)=>Math.hypot(a.x-cb.x,a.y-cb.y)<Math.hypot(b.x-cb.x,b.y-cb.y)?a:b);
    best={angle:Math.atan2(t.y-cb.y,t.x-cb.x)+(Math.random()-.5)*.25, power:0.28+Math.random()*0.28};
  }
  return best;
}

// ─── Respawn cue ──────────────────────────────────────────────────────────────
function respawnCue(){
  let cb=balls.find(b=>b.isCue);
  if(!cb){cb=new Ball(0,0,0);balls.push(cb);}
  cb.x=PX+PW*0.25; cb.y=PY+PH/2;
  cb.vx=cb.vy=0; cb.inPocket=false; cb.sinkT=1;
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update(){
  tick++;
  if(state==='player'&&charging) power=Math.min(1,power+0.013);

  if(state==='moving'||state==='ai_move'){
    for(const b of balls) b.update();
    for(let it=0;it<4;it++)
      for(let i=0;i<balls.length;i++)
        for(let j=i+1;j<balls.length;j++)
          resolveCollision(balls[i],balls[j]);
    const now=balls.filter(b=>!b.isCue&&b.inPocket).length;
    if(now>prevPocketed){
      const d=now-prevPocketed;
      if(state==='moving') playerScore+=d; else aiScore+=d;
      prevPocketed=now;
    }
    if(allStop()){
      if(!getCue()) respawnCue();
      if(!activeBalls().length){
        state='over';
        if(!gameOverSfxPlayed){sfxGameOver();gameOverSfxPlayed=true;}
        return;
      }
      if(state==='moving'){
        state='ai_think'; aiTimer=75+Math.floor(Math.random()*65); aiShot=null;
      } else {
        state='player';
      }
    }
  }

  if(state==='ai_think'){
    aiTimer--;
    if(aiTimer<=0){aiShot=computeAIShot(); state='ai_aim'; aiTimer=50;}
  }

  if(state==='ai_aim'){
    aiTimer--;
    if(aiTimer<=0){
      const cb=getCue();
      if(cb&&aiShot){
        sfxCue(aiShot.power);
        cb.vx=Math.cos(aiShot.angle)*aiShot.power*MAX_POWER;
        cb.vy=Math.sin(aiShot.angle)*aiShot.power*MAX_POWER;
        state='ai_move'; aiShot=null;
      } else {state='player';}
    }
  }
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function draw(){
  drawTable();
  for(const b of balls) b.draw();
  const cb=getCue();
  if(state==='player'&&cb){
    drawAimLine(cb,aimAngle); drawCue(cb,aimAngle,charging?power:0);
    if(charging) drawPower(power);
  }
  if(state==='ai_aim'&&cb&&aiShot){
    ctx.save(); ctx.globalAlpha=0.5; drawAimLine(cb,aiShot.angle); ctx.restore();
    drawCue(cb,aiShot.angle,0);
  }
  drawHUD();
  if(state==='over'){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center';
    ctx.fillStyle='#FFD700'; ctx.font='bold 44px Arial'; ctx.fillText('遊戲結束！',CW/2,CH/2-48);
    ctx.fillStyle='#fff'; ctx.font='28px Arial';
    ctx.fillText(`玩家 ${playerScore}  :  ${aiScore} AI`,CW/2,CH/2+8);
    const w=playerScore>aiScore?'玩家勝利 🎉':playerScore<aiScore?'AI 勝利':'平局';
    ctx.fillStyle='#FFD700'; ctx.font='bold 22px Arial'; ctx.fillText(w,CW/2,CH/2+54);
    ctx.fillStyle='#aaa'; ctx.font='15px Arial'; ctx.fillText('點擊任意處重新開始',CW/2,CH/2+100);
  }
}

// ─── Input ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove',e=>{
  const rc=canvas.getBoundingClientRect();
  mx=e.clientX-rc.left; my=e.clientY-rc.top;
  if(state==='player'){const cb=getCue(); if(cb) aimAngle=Math.atan2(my-cb.y,mx-cb.x);}
});

canvas.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  const rc=canvas.getBoundingClientRect();
  const cx=e.clientX-rc.left, cy=e.clientY-rc.top;
  initAudio(); startMusic();
  if(inMuteBtn(cx,cy)){toggleMute();return;}
  if(state==='player'){charging=true;power=0;}
  if(state==='over'){init();}
});

canvas.addEventListener('mouseup',e=>{
  if(e.button===0&&state==='player'&&charging){
    charging=false;
    if(power>0.06){
      const cb=getCue();
      if(cb){
        sfxCue(power);
        cb.vx=Math.cos(aimAngle)*power*MAX_POWER;
        cb.vy=Math.sin(aimAngle)*power*MAX_POWER;
        state='moving'; power=0;
      }
    }
  }
});

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
