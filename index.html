<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>撞球遊戲</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0b0604;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Arial', sans-serif;
  user-select: none;
  overflow: hidden;
}
canvas { display: block; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ─── Canvas ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const CW = 960, CH = 600;
canvas.width = CW; canvas.height = CH;

// ─── Table geometry ──────────────────────────────────────────────────────────
const FX=20, FY=14, FW=920, FH=540;
const RAIL=42;
const PX=FX+RAIL, PY=FY+RAIL;
const PW=FW-RAIL*2, PH=FH-RAIL*2;   // 836 × 456

// ─── Physics constants ───────────────────────────────────────────────────────
const BR=12, PR=20;
const FRICTION=0.968, MIN_V=0.22;
const REST_BALL=0.93, REST_WALL=0.80;
const MAX_POWER=32;

// ─── Pockets ─────────────────────────────────────────────────────────────────
const POCKETS=[
  {x:PX,       y:PY},      {x:PX+PW/2, y:PY-9},
  {x:PX+PW,    y:PY},      {x:PX,      y:PY+PH},
  {x:PX+PW/2,  y:PY+PH+9},{x:PX+PW,   y:PY+PH},
];

// ─── Ball colours ────────────────────────────────────────────────────────────
const COLORS=[
  null,'#F5D800','#1560CC','#CC1515','#7B1FA2',
  '#F57C00','#2E7D32','#8B1A1A','#111111',
  '#F5D800','#1560CC','#CC1515','#7B1FA2','#F57C00','#2E7D32','#8B1A1A',
];

// ─── Helpers ─────────────────────────────────────────────────────────────────
function hexRgb(h){const n=parseInt(h.replace('#',''),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function tint(h,a){const[r,g,b]=hexRgb(h);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}
function shade(h,a){const[r,g,b]=hexRgb(h);return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

// ════════════════════════════════════════════════════════════════════════════
// ─── AUDIO SYSTEM ────────────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════════════════
let AC=null, masterGain=null, musicGain=null, sfxGain=null;
let muted=false, musicStarted=false, musicTimer=null;
let nextBeat=0, beatCount=0;

// Last-played timestamps for throttle
const sfxLast={};

function initAudio(){
  if(AC) return;
  AC=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=AC.createGain(); masterGain.gain.value=0.8; masterGain.connect(AC.destination);
  musicGain=AC.createGain();  musicGain.gain.value=0.55; musicGain.connect(masterGain);
  sfxGain=AC.createGain();    sfxGain.gain.value=1.0;    sfxGain.connect(masterGain);
}

function toggleMute(){
  muted=!muted;
  if(masterGain) masterGain.gain.setTargetAtTime(muted?0:0.8, AC.currentTime, 0.08);
}

function canPlay(key, ms=40){
  const now=performance.now();
  if(!sfxLast[key]||now-sfxLast[key]>ms){sfxLast[key]=now;return true;}
  return false;
}

// ─── Background Music (jazz lounge) ──────────────────────────────────────────
const BPM=108, BEAT=60/BPM;

// Chord progression: Cmaj7 → Am7 → Dm7 → G7
const PROG=[
  {bass:65.41, walk:98.00, pad:[261.63,329.63,392.00,493.88]},  // Cmaj7
  {bass:55.00, walk:82.41, pad:[220.00,261.63,329.63,392.00]},  // Am7
  {bass:73.42, walk:110.0, pad:[293.66,349.23,440.00,523.25]},  // Dm7
  {bass:49.00, walk:73.42, pad:[196.00,246.94,293.66,349.23]},  // G7
];

function mPad(freqs, t0, dur){
  freqs.forEach(f=>{
    const o=AC.createOscillator(), e=AC.createGain(), fi=AC.createBiquadFilter();
    fi.type='lowpass'; fi.frequency.value=900;
    o.type='sine'; o.frequency.value=f;
    o.connect(fi); fi.connect(e); e.connect(musicGain);
    e.gain.setValueAtTime(0,t0);
    e.gain.linearRampToValueAtTime(0.065,t0+0.5);
    e.gain.setValueAtTime(0.055,t0+dur-0.4);
    e.gain.linearRampToValueAtTime(0,t0+dur);
    o.start(t0); o.stop(t0+dur+0.1);
  });
}

function mBass(freq, t0, dur){
  const o=AC.createOscillator(), e=AC.createGain(), fi=AC.createBiquadFilter();
  fi.type='lowpass'; fi.frequency.value=380;
  o.type='triangle'; o.frequency.value=freq;
  o.connect(fi); fi.connect(e); e.connect(musicGain);
  e.gain.setValueAtTime(0,t0);
  e.gain.linearRampToValueAtTime(0.25,t0+0.03);
  e.gain.setValueAtTime(0.20,t0+dur*0.65);
  e.gain.linearRampToValueAtTime(0,t0+dur);
  o.start(t0); o.stop(t0+dur+0.05);
}

function mKick(t0, vol=0.38){
  const o=AC.createOscillator(), e=AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(140,t0);
  o.frequency.exponentialRampToValueAtTime(38,t0+0.18);
  o.connect(e); e.connect(musicGain);
  e.gain.setValueAtTime(vol,t0);
  e.gain.exponentialRampToValueAtTime(0.001,t0+0.22);
  o.start(t0); o.stop(t0+0.25);
}

function mHat(t0, vol=0.06, dec=0.04){
  const sz=Math.ceil(AC.sampleRate*(dec+0.01));
  const buf=AC.createBuffer(1,sz,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<sz;i++) d[i]=Math.random()*2-1;
  const s=AC.createBufferSource(), fi=AC.createBiquadFilter(), e=AC.createGain();
  fi.type='highpass'; fi.frequency.value=8500;
  s.buffer=buf;
  s.connect(fi); fi.connect(e); e.connect(musicGain);
  e.gain.setValueAtTime(vol,t0);
  e.gain.exponentialRampToValueAtTime(0.001,t0+dec);
  s.start(t0); s.stop(t0+dec+0.01);
}

function scheduleBeat(){
  if(!AC) return;
  while(nextBeat < AC.currentTime+0.3){
    const bar=Math.floor(beatCount/4)%PROG.length;
    const beat=beatCount%4;
    const p=PROG[bar];
    const np=PROG[(bar+1)%PROG.length];

    if(beat===0){ mPad(p.pad, nextBeat, BEAT*4*0.93); }

    if(beat===0) mBass(p.bass, nextBeat, BEAT*1.75);
    if(beat===2) mBass(p.walk, nextBeat, BEAT*1.75);
    if(beat===3) mBass(np.bass*2, nextBeat+BEAT*0.5, BEAT*0.45);

    if(beat===0) mKick(nextBeat);
    if(beat===2) mKick(nextBeat, 0.18);

    mHat(nextBeat, 0.09, 0.055);
    mHat(nextBeat+BEAT*0.5, 0.055, 0.03);
    mHat(nextBeat+BEAT*0.25, 0.03, 0.02);
    mHat(nextBeat+BEAT*0.75, 0.03, 0.02);

    nextBeat+=BEAT; beatCount++;
  }
  musicTimer=setTimeout(scheduleBeat, 100);
}

function startMusic(){
  if(musicStarted||!AC) return;
  musicStarted=true;
  nextBeat=AC.currentTime+0.12;
  scheduleBeat();
}

// ─── SFX ─────────────────────────────────────────────────────────────────────
function sfxCue(pwr){
  if(!AC||muted) return;
  const t=AC.currentTime, v=0.25+pwr*0.65;
  const o=AC.createOscillator(), e=AC.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(900,t);
  o.frequency.exponentialRampToValueAtTime(180,t+0.09);
  o.connect(e); e.connect(sfxGain);
  e.gain.setValueAtTime(v*0.55,t);
  e.gain.exponentialRampToValueAtTime(0.001,t+0.13);
  o.start(t); o.stop(t+0.14);
  const o2=AC.createOscillator(), e2=AC.createGain();
  o2.frequency.setValueAtTime(200,t);
  o2.frequency.exponentialRampToValueAtTime(55,t+0.11);
  o2.connect(e2); e2.connect(sfxGain);
  e2.gain.setValueAtTime(v*0.45,t);
  e2.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  o2.start(t); o2.stop(t+0.15);
}

function sfxBallHit(intensity){
  if(!AC||muted||!canPlay('hit',40)) return;
  const t=AC.currentTime, v=Math.min(1,intensity);
  const sz=Math.ceil(AC.sampleRate*0.06);
  const buf=AC.createBuffer(1,sz,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<sz;i++) d[i]=Math.random()*2-1;
  const ns=AC.createBufferSource(), fi=AC.createBiquadFilter(), e=AC.createGain();
  fi.type='bandpass'; fi.frequency.value=2200; fi.Q.value=2.5;
  ns.buffer=buf; ns.connect(fi); fi.connect(e); e.connect(sfxGain);
  e.gain.setValueAtTime(v*0.75,t);
  e.gain.exponentialRampToValueAtTime(0.001,t+0.065);
  ns.start(t); ns.stop(t+0.07);
  const o=AC.createOscillator(), oe=AC.createGain();
  o.frequency.value=1100+v*500;
  o.connect(oe); oe.connect(sfxGain);
  oe.gain.setValueAtTime(v*0.3,t);
  oe.gain.exponentialRampToValueAtTime(0.001,t+0.04);
  o.start(t); o.stop(t+0.045);
}

function sfxWall(intensity){
  if(!AC||muted||!canPlay('wall',80)) return;
  const t=AC.currentTime, v=Math.min(0.5,intensity*0.45);
  const o=AC.createOscillator(), e=AC.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(260,t);
  o.frequency.exponentialRampToValueAtTime(85,t+0.1);
  o.connect(e); e.connect(sfxGain);
  e.gain.setValueAtTime(v,t);
  e.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.start(t); o.stop(t+0.13);
}

function sfxPocket(){
  if(!AC||muted||!canPlay('pocket',150)) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(), e=AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(300,t);
  o.frequency.exponentialRampToValueAtTime(72,t+0.3);
  o.connect(e); e.connect(sfxGain);
  e.gain.setValueAtTime(0.5,t);
  e.gain.exponentialRampToValueAtTime(0.001,t+0.34);
  o.start(t); o.stop(t+0.36);
  const o2=AC.createOscillator(), e2=AC.createGain();
  o2.type='sine';
  o2.frequency.setValueAtTime(105,t);
  o2.frequency.exponentialRampToValueAtTime(32,t+0.2);
  o2.connect(e2); e2.connect(sfxGain);
  e2.gain.setValueAtTime(0.38,t);
  e2.gain.exponentialRampToValueAtTime(0.001,t+0.24);
  o2.start(t); o2.stop(t+0.26);
}

function sfxGameOver(){
  if(!AC||muted) return;
  const t=AC.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
    const o=AC.createOscillator(), e=AC.createGain();
    o.type='triangle'; o.frequency.value=f;
    o.connect(e); e.connect(sfxGain);
    const s=t+i*0.18;
    e.gain.setValueAtTime(0.35,s);
    e.gain.exponentialRampToValueAtTime(0.001,s+0.45);
    o.start(s); o.stop(s+0.5);
  });
}

// ─── Ball class ───────────────────────────────────────────────────────────────
class Ball {
  constructor(x,y,num){
    this.x=x; this.y=y; this.vx=0; this.vy=0;
    this.num=num; this.color=COLORS[num]||'#fff';
    this.isCue=(num===0); this.isStripe=(num>=9);
    this.inPocket=false; this.sinkT=1.0;
    this.angle=0;          // rolling rotation
    this.trail=[];         // [{x,y,a}] motion trail
  }
  get moving(){return this.vx!==0||this.vy!==0;}
  update(){
    if(this.inPocket){this.sinkT=Math.max(0,this.sinkT-0.08);return;}
    // Motion trail
    const spd2=Math.hypot(this.vx,this.vy);
    if(spd2>1.8){
      this.trail.push({x:this.x,y:this.y,a:0.38*Math.min(1,spd2/8)});
      if(this.trail.length>7) this.trail.shift();
    } else { this.trail=[]; }

    this.x+=this.vx; this.y+=this.vy;
    // Rolling rotation angle
    const dist2=Math.hypot(this.vx,this.vy);
    this.angle+=dist2/BR;
    this.vx*=FRICTION; this.vy*=FRICTION;
    if(Math.abs(this.vx)<MIN_V) this.vx=0;
    if(Math.abs(this.vy)<MIN_V) this.vy=0;

    for(const p of POCKETS){
      if(Math.hypot(this.x-p.x,this.y-p.y)<PR){
        this.inPocket=true; this.vx=this.vy=0;
        sfxPocket();
        spawnPocketFlash(this.x,this.y);
        spawnFloatText(this.x,this.y-24,'+1',this.isCue?'#ff8888':'#FFD700');
        return;
      }
    }

    const L=PX+BR, R=PX+PW-BR, T=PY+BR, B=PY+PH-BR;
    const spd=Math.hypot(this.vx,this.vy);
    if(this.x<L){this.x=L; this.vx=Math.abs(this.vx)*REST_WALL; sfxWall(spd/MAX_POWER);}
    if(this.x>R){this.x=R; this.vx=-Math.abs(this.vx)*REST_WALL; sfxWall(spd/MAX_POWER);}
    if(this.y<T){this.y=T; this.vy=Math.abs(this.vy)*REST_WALL; sfxWall(spd/MAX_POWER);}
    if(this.y>B){this.y=B; this.vy=-Math.abs(this.vy)*REST_WALL; sfxWall(spd/MAX_POWER);}
  }
  draw(){
    if(this.inPocket&&this.sinkT<=0) return;

    // Motion trail
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i];
      const frac=(i+1)/this.trail.length;
      ctx.save();
      ctx.globalAlpha=t.a*frac*0.55;
      ctx.beginPath();
      ctx.arc(t.x,t.y,BR*frac*0.85,0,Math.PI*2);
      ctx.fillStyle=this.isCue?'#ffffff':this.color;
      ctx.fill();
      ctx.restore();
    }

    // Ground shadow
    if(!this.inPocket){
      ctx.save();
      ctx.globalAlpha=0.28;
      ctx.beginPath();
      ctx.ellipse(this.x+3, this.y+BR*0.55, BR*0.85, BR*0.32, 0, 0, Math.PI*2);
      ctx.fillStyle='#000';
      ctx.filter='blur(3px)';
      ctx.fill();
      ctx.filter='none';
      ctx.restore();
    }

    ctx.save(); ctx.translate(this.x,this.y);
    if(this.inPocket) ctx.scale(this.sinkT,this.sinkT);
    // Rolling: rotate a subtle mark on the ball
    ctx.rotate(this.angle);
    this._render(); ctx.restore();
  }
  _render(){
    const r=BR;
    if(this.isCue){
      const g=ctx.createRadialGradient(-r*.35,-r*.35,r*.04,0,0,r);
      g.addColorStop(0,'#ffffff'); g.addColorStop(0.65,'#dedede'); g.addColorStop(1,'#aaaaaa');
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    } else if(this.isStripe){
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle='#f5f5f5'; ctx.fill();
      ctx.save(); ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
      ctx.fillStyle=this.color; ctx.fillRect(-r,-r*0.46,r*2,r*0.92); ctx.restore();
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
      ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.8; ctx.stroke();
    } else {
      const g=ctx.createRadialGradient(-r*.32,-r*.36,r*.04,0,0,r*1.05);
      g.addColorStop(0,tint(this.color,65)); g.addColorStop(0.45,this.color); g.addColorStop(1,shade(this.color,55));
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    }
    if(!this.isCue){
      ctx.beginPath(); ctx.arc(0,0,r*.41,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.88)'; ctx.fill();
      ctx.fillStyle='#111'; ctx.font=`bold ${r*.56}px Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.num,0,0.5);
    }
    ctx.beginPath();
    ctx.ellipse(-r*.28,-r*.32,r*.28,r*.18,-Math.PI/4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.42)'; ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.7; ctx.stroke();
  }
}

// ─── Particles ───────────────────────────────────────────────────────────────
const particles=[];

function spawnSpark(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=1.5+Math.random()*3.5;
    particles.push({
      x,y,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      r:2+Math.random()*2.5,
      life:1.0,
      decay:0.045+Math.random()*0.04,
      color
    });
  }
}

function spawnPocketFlash(x,y){
  for(let i=0;i<18;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=2+Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      r:3+Math.random()*4,
      life:1.0,
      decay:0.035+Math.random()*0.03,
      color:`hsl(${40+Math.random()*30},100%,70%)`
    });
  }
}

// Score float texts
const floatTexts=[];
function spawnFloatText(x,y,txt,col){
  floatTexts.push({x,y,txt,col,life:1.0,vy:-1.2});
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.88; p.vy*=0.88;
    p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
  for(let i=floatTexts.length-1;i>=0;i--){
    const t=floatTexts[i];
    t.y+=t.vy; t.life-=0.022;
    if(t.life<=0) floatTexts.splice(i,1);
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha=p.life*0.9;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.fill();
    ctx.restore();
  }
  for(const t of floatTexts){
    ctx.save();
    ctx.globalAlpha=t.life;
    ctx.font='bold 18px Arial';
    ctx.textAlign='center';
    ctx.fillStyle=t.col;
    ctx.shadowColor='#000'; ctx.shadowBlur=5;
    ctx.fillText(t.txt,t.x,t.y);
    ctx.restore();
  }
}

// ─── Collision ────────────────────────────────────────────────────────────────
function resolveCollision(a,b){
  if(a.inPocket||b.inPocket) return;
  const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy);
  if(d===0||d>=BR*2) return;
  const nx=dx/d, ny=dy/d;
  const vrel=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
  if(vrel<=0) return;
  if(vrel>0.4){
    sfxBallHit(vrel/MAX_POWER);
    const mx2=(a.x+b.x)/2, my2=(a.y+b.y)/2;
    const col=a.isCue?b.color:a.color;
    spawnSpark(mx2,my2,col, Math.min(12,Math.ceil(vrel*1.8)));
  }
  const imp=vrel*REST_BALL;
  a.vx-=imp*nx; a.vy-=imp*ny;
  b.vx+=imp*nx; b.vy+=imp*ny;
  const ov=(BR*2-d)/2;
  a.x-=nx*ov; a.y-=ny*ov;
  b.x+=nx*ov; b.y+=ny*ov;
}

// ─── Raycast ─────────────────────────────────────────────────────────────────
function raycast(ox,oy,angle){
  const dx=Math.cos(angle), dy=Math.sin(angle);
  let minT=99999, hitBall=null;
  for(const b of balls){
    if(b.isCue||b.inPocket) continue;
    const ex=b.x-ox, ey=b.y-oy;
    const proj=ex*dx+ey*dy;
    if(proj<BR) continue;
    const perp=ex*dy-ey*dx, r2=BR*2;
    if(Math.abs(perp)>=r2) continue;
    const t=proj-Math.sqrt(r2*r2-perp*perp);
    if(t>0&&t<minT){minT=t; hitBall=b;}
  }
  const L=PX+BR, R=PX+PW-BR, T=PY+BR, B=PY+PH-BR;
  const ts=[];
  if(dx!==0){ts.push((L-ox)/dx,(R-ox)/dx);}
  if(dy!==0){ts.push((T-oy)/dy,(B-oy)/dy);}
  const wallT=Math.min(...ts.filter(t=>t>0.1));
  const useT=hitBall?minT:wallT;
  return{ex:ox+dx*useT, ey:oy+dy*useT, hitBall};
}

// ─── Ball rack ────────────────────────────────────────────────────────────────
function makeBalls(){
  const list=[];
  list.push(new Ball(PX+PW*0.25, PY+PH/2, 0));
  const rx=PX+PW*0.65, ry=PY+PH/2, sp=BR*2.06;
  const rows=[[1],[9,2],[3,8,10],[4,14,11,7],[12,6,15,13,5]];
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      list.push(new Ball(
        rx+r*sp*Math.cos(Math.PI/6),
        ry+(c-(row.length-1)/2)*sp,
        row[c]
      ));
    }
  }
  return list;
}

// ─── Game state ───────────────────────────────────────────────────────────────
let balls, state, aimAngle, targetAngle, power, charging;
let mx=CW/2, my=CH/2;
let aiTimer, aiShot;
let playerScore, aiScore, prevPocketed, tick;
let gameOverSfxPlayed=false;

// UI animation state

let overAlpha=0;           // 0→1 game-over overlay fade
let scoreFlash={p:0,a:0};  // pulse scale for player/ai score pop
let overStars=[];          // star particles for game-over screen

// Strike animation: {angle, pullOffset, power, t, launched, isAI}
// t: 0→1 over STRIKE_FRAMES frames
// phase 0→0.35 : lunge forward; 0.35→1 : retract
let strikeAnim=null;
const STRIKE_FRAMES=14;  // total frames for full animation
const LUNGE=28;           // how many px past ball centre the tip travels

// 角度平滑插值（處理 -π/π 越界）
function lerpAngle(a, b, t){
  let d=b-a;
  while(d> Math.PI) d-=Math.PI*2;
  while(d<-Math.PI) d+=Math.PI*2;
  return a+d*t;
}

function init(){
  balls=makeBalls(); state='intro';
  aimAngle=0; targetAngle=0; power=0; charging=false;
  aiTimer=0; aiShot=null;
  playerScore=0; aiScore=0; prevPocketed=0; tick=0;
  gameOverSfxPlayed=false;
  introAlpha=0; overAlpha=0;
  scoreFlash={p:0,a:0};
  overStars=[];
}
init();

function getCue(){return balls.find(b=>b.isCue&&!b.inPocket);}
function allStop(){return balls.every(b=>b.inPocket||(b.vx===0&&b.vy===0));}
function activeBalls(){return balls.filter(b=>!b.isCue&&!b.inPocket);}

// ─── Draw: aim line ──────────────────────────────────────────────────────────
function drawAimLine(cb,angle){
  const{ex,ey,hitBall}=raycast(cb.x,cb.y,angle);
  ctx.save();

  // Gradient fade-out along guide line
  const lineGrad=ctx.createLinearGradient(cb.x,cb.y,ex,ey);
  lineGrad.addColorStop(0,  'rgba(255,255,200,0.75)');
  lineGrad.addColorStop(0.5,'rgba(255,255,180,0.45)');
  lineGrad.addColorStop(1,  'rgba(255,255,160,0.05)');
  ctx.setLineDash([9,6]);
  ctx.strokeStyle=lineGrad;
  ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.moveTo(cb.x,cb.y); ctx.lineTo(ex,ey); ctx.stroke();

  if(hitBall){
    // Ghost ball at impact with soft glow
    ctx.setLineDash([]);
    ctx.shadowColor='rgba(255,255,255,0.5)'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(ex,ey,BR,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=1.8; ctx.stroke();
    ctx.shadowBlur=0;

    // Target ball deflect arrow
    const bA=Math.atan2(hitBall.y-ey,hitBall.x-ex);
    const bGrad=ctx.createLinearGradient(ex,ey, ex+Math.cos(bA)*90,ey+Math.sin(bA)*90);
    bGrad.addColorStop(0,'rgba(255,210,60,0.7)');
    bGrad.addColorStop(1,'rgba(255,210,60,0.04)');
    ctx.setLineDash([5,6]);
    ctx.beginPath(); ctx.moveTo(ex,ey);
    ctx.lineTo(ex+Math.cos(bA)*90, ey+Math.sin(bA)*90);
    ctx.strokeStyle=bGrad; ctx.lineWidth=1.2; ctx.stroke();

    // Cue ball deflect arrow
    const cA=bA-Math.PI/2;
    const cGrad=ctx.createLinearGradient(ex,ey, ex+Math.cos(cA)*65,ey+Math.sin(cA)*65);
    cGrad.addColorStop(0,'rgba(160,255,160,0.6)');
    cGrad.addColorStop(1,'rgba(160,255,160,0.03)');
    ctx.beginPath(); ctx.moveTo(ex,ey);
    ctx.lineTo(ex+Math.cos(cA)*65, ey+Math.sin(cA)*65);
    ctx.strokeStyle=cGrad; ctx.lineWidth=1.2; ctx.stroke();

    // Impact dot
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(ex,ey,3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.shadowColor='#fff'; ctx.shadowBlur=6; ctx.fill(); ctx.shadowBlur=0;
  }
  ctx.setLineDash([]); ctx.restore();
}

// ─── Draw: cue ───────────────────────────────────────────────────────────────
function drawCue(cb,angle,pull,overrideOff=null){
  if(!cb) return;
  const len=250;
  const off = overrideOff!==null ? overrideOff : BR+10+pull*30;
  const tx=cb.x-Math.cos(angle)*off, ty=cb.y-Math.sin(angle)*off;
  const bx=tx-Math.cos(angle)*len,   by=ty-Math.sin(angle)*len;
  ctx.save(); ctx.lineCap='round';
  ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=5; ctx.shadowOffsetY=2;
  const g=ctx.createLinearGradient(tx,ty,bx,by);
  g.addColorStop(0,'#d4c06a'); g.addColorStop(0.06,'#b89040');
  g.addColorStop(0.5,'#8b6030'); g.addColorStop(1,'#3e1e00');
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(bx,by);
  ctx.strokeStyle=g; ctx.lineWidth=5; ctx.stroke();
  ctx.shadowColor='transparent';
  ctx.beginPath(); ctx.moveTo(tx,ty);
  ctx.lineTo(tx-Math.cos(angle)*10,ty-Math.sin(angle)*10);
  ctx.strokeStyle='#5599ee'; ctx.lineWidth=3; ctx.stroke();
  ctx.restore();
}

// ─── AI logic ─────────────────────────────────────────────────────────────────
// Check if path from (ox,oy) in direction angle for length maxT is clear of other balls
function pathClear(ox,oy,angle,maxT,excludeA,excludeB){
  const dx=Math.cos(angle), dy=Math.sin(angle);
  for(const b of balls){
    if(b===excludeA||b===excludeB||b.inPocket) continue;
    const ex=b.x-ox, ey=b.y-oy;
    const proj=ex*dx+ey*dy;
    if(proj<BR||proj>maxT) continue;
    if(Math.abs(ex*dy-ey*dx)<BR*2) return false;
  }
  return true;
}

function computeAIShot(){
  const cb=getCue(); if(!cb) return null;
  const targets=activeBalls(); if(!targets.length) return null;
  let best=null, bestScore=-Infinity;

  for(const t of targets){
    for(const p of POCKETS){
      // Vector: target ball → pocket
      const tpDx=p.x-t.x, tpDy=p.y-t.y, tpD=Math.hypot(tpDx,tpDy);
      if(tpD<1) continue;
      const nx=-tpDx/tpD, ny=-tpDy/tpD;

      // Ghost ball position (where cue ball must arrive)
      const ix=t.x+nx*BR*2, iy=t.y+ny*BR*2;
      const cdx=ix-cb.x, cdy=iy-cb.y, cueDist=Math.hypot(cdx,cdy);
      if(cueDist<1) continue;
      const cueAngle=Math.atan2(cdy,cdx);

      // 1. Path from cue ball to ghost-ball position must be clear
      if(!pathClear(cb.x,cb.y,cueAngle,cueDist,cb,t)) continue;

      // 2. Path from target ball to pocket must be clear
      const toPocketAngle=Math.atan2(tpDy,tpDx);
      if(!pathClear(t.x,t.y,toPocketAngle,tpD,cb,t)) continue;

      // Score: prefer short cue-travel, short ball-to-pocket, wide cut angles are harder
      const cutAngle=Math.abs(Math.acos(Math.max(-1,Math.min(1,
        (cdx/cueDist)*(-nx)+(cdy/cueDist)*(-ny)
      ))));
      // Sharp cuts (>75°) are very hard — penalise heavily
      if(cutAngle>1.35) continue;

      const score =
        500 / (tpD + 1)          // prefer ball close to pocket
        - cueDist * 0.25          // prefer short cue travel
        - cutAngle * 60           // prefer straighter shots
        + (Math.random() * 6);   // tiny noise (was 20 — now 6)

      if(score>bestScore){
        bestScore=score;
        // Power: scale to cover cue→ghost distance, min 0.32 max 0.88
        const neededPower=Math.min(0.88, Math.max(0.32, cueDist/700 + tpD/900 + 0.28));
        // Tiny angle jitter (±1.5°) to feel human
        const jitter=(Math.random()-0.5)*0.052;
        best={angle:cueAngle+jitter, power:neededPower};
      }
    }
  }

  // Fallback: aim at nearest ball toward its nearest pocket
  if(!best){
    const t=targets.reduce((a,b)=>
      Math.hypot(a.x-cb.x,a.y-cb.y)<Math.hypot(b.x-cb.x,b.y-cb.y)?a:b
    );
    // Find nearest pocket to that ball
    const bp=POCKETS.reduce((a,b)=>
      Math.hypot(a.x-t.x,a.y-t.y)<Math.hypot(b.x-t.x,b.y-t.y)?a:b
    );
    const nx2=-(bp.x-t.x), ny2=-(bp.y-t.y);
    const nd=Math.hypot(nx2,ny2);
    const ix2=t.x+nx2/nd*BR*2, iy2=t.y+ny2/nd*BR*2;
    const fa=Math.atan2(iy2-cb.y,ix2-cb.x)+(Math.random()-.5)*0.12;
    best={angle:fa, power:0.38+Math.random()*0.25};
  }
  return best;
}

// ─── Respawn cue ──────────────────────────────────────────────────────────────
function respawnCue(){
  let cb=balls.find(b=>b.isCue);
  if(!cb){cb=new Ball(0,0,0);balls.push(cb);}
  cb.x=PX+PW*0.25; cb.y=PY+PH/2;
  cb.vx=cb.vy=0; cb.inPocket=false; cb.sinkT=1;
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update(){
  tick++;

  // Intro fade-in
  if(state==='intro'){ introAlpha=Math.min(1,introAlpha+0.025); return; }

  // Game-over animation
  if(state==='over'){
    overAlpha=Math.min(1,overAlpha+0.04);
    // Spawn celebratory stars
    if(overStars.length<60&&Math.random()<0.35){
      overStars.push({
        x:Math.random()*CW, y:Math.random()*CH,
        r:1.5+Math.random()*3,
        life:0.6+Math.random()*0.4,
        color:`hsl(${40+Math.random()*40},100%,${60+Math.random()*30}%)`
      });
    }
    for(const s of overStars){ s.y-=0.4; s.life-=0.005; }
    overStars.splice(0, overStars.length, ...overStars.filter(s=>s.life>0));
    return;
  }

  if(state==='player'&&charging) power=Math.min(1,power+0.028);
  if(state==='player') aimAngle=lerpAngle(aimAngle, targetAngle, 0.18);
  updateParticles();

  if(state==='moving'||state==='ai_move'){
    for(const b of balls) b.update();
    for(let it=0;it<4;it++)
      for(let i=0;i<balls.length;i++)
        for(let j=i+1;j<balls.length;j++)
          resolveCollision(balls[i],balls[j]);
    const now=balls.filter(b=>!b.isCue&&b.inPocket).length;
    if(now>prevPocketed){
      const d=now-prevPocketed;
      if(state==='moving'){ playerScore+=d; scoreFlash.p=1; }
      else                { aiScore+=d;     scoreFlash.a=1; }
      prevPocketed=now;
    }
    if(allStop()){
      if(!getCue()) respawnCue();
      if(!activeBalls().length){
        state='over'; overAlpha=0;
        if(!gameOverSfxPlayed){sfxGameOver();gameOverSfxPlayed=true;}
        return;
      }
      if(state==='moving'){
        state='ai_think'; aiTimer=25+Math.floor(Math.random()*20); aiShot=null;
      } else {
        state='player';
      }
    }
  }

  if(state==='ai_think'){
    aiTimer--;
    if(aiTimer<=0){aiShot=computeAIShot(); state='ai_aim'; aiTimer=22;}
  }

  if(state==='ai_aim'){
    aiTimer--;
    if(aiTimer<=0){
      const cb=getCue();
      if(cb&&aiShot){
        // AI also uses strike animation
        strikeAnim={angle:aiShot.angle, pullOffset:aiShot.power*30, power:aiShot.power, t:0, launched:false, isAI:true};
        state='striking';
        aiShot=null;
      } else {state='player';}
    }
  }

  // Strike animation
  if(state==='striking'&&strikeAnim){
    strikeAnim.t+=1/STRIKE_FRAMES;
    // Launch ball at peak of lunge (t=0.35)
    if(!strikeAnim.launched && strikeAnim.t>=0.35){
      strikeAnim.launched=true;
      const cb=getCue();
      if(cb){
        sfxCue(strikeAnim.power);
        cb.vx=Math.cos(strikeAnim.angle)*strikeAnim.power*MAX_POWER;
        cb.vy=Math.sin(strikeAnim.angle)*strikeAnim.power*MAX_POWER;
      }
    }
    if(strikeAnim.t>=1){
      state=strikeAnim.isAI ? 'ai_move' : 'moving';
      strikeAnim=null;
    }
  }
}

// ─── Draw: intro screen ──────────────────────────────────────────────────────
function drawIntro(){
  ctx.save(); ctx.globalAlpha=introAlpha;

  // Dark vignette
  ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(0,0,CW,CH);

  // Title glow halo
  const halo=ctx.createRadialGradient(CW/2,CH/2-30,10,CW/2,CH/2-30,220);
  halo.addColorStop(0,'rgba(60,180,90,0.18)');
  halo.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=halo; ctx.fillRect(0,0,CW,CH);

  // Title
  ctx.textAlign='center';
  ctx.shadowColor='rgba(50,220,100,0.7)'; ctx.shadowBlur=24;
  ctx.fillStyle='#e8ffe8'; ctx.font='bold 58px Arial';
  ctx.fillText('撞球遊戲', CW/2, CH/2-40);
  ctx.shadowBlur=0;

  // Subtitle
  ctx.fillStyle='rgba(200,255,210,0.75)'; ctx.font='18px Arial';
  ctx.fillText('台球練習模式　玩家 vs AI', CW/2, CH/2+10);

  // Start hint pulsing
  const pulse=0.65+0.35*Math.sin(tick*0.08);
  ctx.globalAlpha=introAlpha*pulse;
  ctx.fillStyle='#FFD700'; ctx.font='bold 16px Arial';
  ctx.shadowColor='rgba(255,210,0,0.6)'; ctx.shadowBlur=10;
  ctx.fillText('點擊任意處開始', CW/2, CH/2+60);
  ctx.shadowBlur=0;

  // Controls hint
  ctx.globalAlpha=introAlpha*0.55;
  ctx.fillStyle='#aaa'; ctx.font='13px Arial';
  ctx.fillText('按住左鍵蓄力　放開擊球　滑鼠瞄準', CW/2, CH/2+95);

  ctx.restore();
}

// ─── Draw: game-over screen ──────────────────────────────────────────────────
function drawOver(){
  if(overAlpha<=0) return;
  ctx.save(); ctx.globalAlpha=overAlpha;

  // Overlay
  ctx.fillStyle='rgba(0,0,0,0.80)'; ctx.fillRect(0,0,CW,CH);

  // Star particles
  for(const s of overStars){
    ctx.save();
    ctx.globalAlpha=overAlpha*s.life;
    ctx.fillStyle=s.color;
    ctx.shadowColor=s.color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Card
  const cw=380, ch=220, cx=CW/2-cw/2, cy=CH/2-ch/2;
  const cg=ctx.createLinearGradient(cx,cy,cx,cy+ch);
  cg.addColorStop(0,'rgba(30,20,10,0.95)');
  cg.addColorStop(1,'rgba(10,8,4,0.98)');
  rr(cx,cy,cw,ch,18); ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='rgba(200,160,40,0.55)'; ctx.lineWidth=2; ctx.stroke();

  // Title
  ctx.textAlign='center';
  ctx.shadowColor='rgba(255,200,0,0.8)'; ctx.shadowBlur=16;
  ctx.fillStyle='#FFD700'; ctx.font='bold 38px Arial';
  ctx.fillText('遊戲結束', CW/2, cy+52);
  ctx.shadowBlur=0;

  // Score
  ctx.fillStyle='#fff'; ctx.font='bold 28px Arial';
  ctx.fillText(`${playerScore}  :  ${aiScore}`, CW/2, cy+102);
  ctx.fillStyle='rgba(180,180,180,0.7)'; ctx.font='13px Arial';
  ctx.fillText('玩家　　　　AI', CW/2, cy+122);

  // Result
  const isWin=playerScore>playerScore+aiScore-playerScore; // always false trick — just compare
  const result= playerScore>aiScore ? '玩家勝利 🎉' : playerScore<aiScore ? 'AI 勝利 🤖' : '平局 🤝';
  const rc    = playerScore>aiScore ? '100,220,120' : playerScore<aiScore ? '255,160,60' : '180,180,180';
  ctx.shadowColor=`rgba(${rc},0.7)`; ctx.shadowBlur=10;
  ctx.fillStyle=`rgb(${rc})`; ctx.font='bold 20px Arial';
  ctx.fillText(result, CW/2, cy+158);
  ctx.shadowBlur=0;

  // Restart hint
  const pulse=0.6+0.4*Math.sin(tick*0.07);
  ctx.globalAlpha=overAlpha*pulse;
  ctx.fillStyle='rgba(200,200,200,0.7)'; ctx.font='14px Arial';
  ctx.fillText('點擊任意處重新開始', CW/2, cy+195);

  ctx.restore();
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function draw(){
  drawTable();
  for(const b of balls) b.draw();
  drawParticles();
  const cb=getCue();
  if(state==='player'&&cb){
    drawAimLine(cb,aimAngle); drawCue(cb,aimAngle,charging?power:0);
    if(charging) drawPower(power);
  }
  if(state==='ai_aim'&&cb&&aiShot){
    ctx.save(); ctx.globalAlpha=0.5; drawAimLine(cb,aiShot.angle); ctx.restore();
    drawCue(cb,aiShot.angle,0);
  }
  if(state==='striking'&&strikeAnim&&cb){
    // t: 0→0.35 lunge forward, 0.35→1 retract
    const t=strikeAnim.t;
    let off;
    if(t<0.35){
      // ease-in: pull → -LUNGE (tip punches past ball)
      const p=t/0.35;
      const eased=p*p;  // accelerate into hit
      off=strikeAnim.pullOffset*(1-eased) + (-LUNGE)*eased;
    } else {
      // retract: -LUNGE → pullOffset (bounce back)
      const p=(t-0.35)/0.65;
      const eased=1-Math.pow(1-p,2);  // decelerate
      off=(-LUNGE)*(1-eased) + (BR+10+strikeAnim.pullOffset)*eased;
    }
    drawCue(cb, strikeAnim.angle, 0, Math.max(-LUNGE, off));
  }
  if(state!=='intro') drawHUD();
  if(state==='intro') drawIntro();
  if(state==='over')  drawOver();
}

// ─── Input ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove',e=>{
  const rc=canvas.getBoundingClientRect();
  mx=e.clientX-rc.left; my=e.clientY-rc.top;
  if(state==='player'){const cb=getCue(); if(cb) targetAngle=Math.atan2(my-cb.y,mx-cb.x);}
});

canvas.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  const rc=canvas.getBoundingClientRect();
  const cx=e.clientX-rc.left, cy=e.clientY-rc.top;
  initAudio(); startMusic();
  if(inMuteBtn(cx,cy)){toggleMute();return;}
  if(state==='intro'){ state='player'; return; }
  if(state==='over'){ init(); state='player'; return; }
  if(state==='player'){charging=true;power=0;}
});

canvas.addEventListener('mouseup',e=>{
  if(e.button===0&&state==='player'&&charging){
    charging=false;
    if(power>0.06){
      // Start strike animation; ball launches mid-animation
      strikeAnim={angle:aimAngle, pullOffset:power*30, power, t:0, launched:false, isAI:false};
      state='striking';
      power=0;
    }
  }
});

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
